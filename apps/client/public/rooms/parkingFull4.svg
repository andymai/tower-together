<svg preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Back wall - concrete garage -->
  <rect x="0" y="0" width="80" height="72" fill="#7a7a76"/>

  <!-- Concrete panel seams -->
  <rect x="0" y="32" width="80" height="1" fill="#585854"/>
  <rect x="40" y="0" width="1" height="32" fill="#585854"/>

  <!-- Baseboard -->
  <rect x="0" y="72" width="80" height="4" fill="#484844"/>

  <!-- Floor - asphalt -->
  <rect x="0" y="76" width="80" height="4" fill="#484844"/>
  <!-- Parking space division stripes -->
  <rect x="2" y="76" width="2" height="4" fill="#d8c040"/>
  <rect x="76" y="76" width="2" height="4" fill="#d8c040"/>

  <!-- Ceiling fluorescent -->
  <rect x="20" y="0" width="40" height="3" fill="#c8c8b8"/>
  <rect x="24" y="3" width="32" height="2" fill="#a8a8a0"/>

  <!-- Support pillars -->
  <rect x="4" y="6" width="4" height="60" fill="#8a8a86"/>
  <rect x="4" y="6" width="4" height="2" fill="#6a6a66"/>
  <rect x="4" y="64" width="4" height="2" fill="#6a6a66"/>
  <rect x="72" y="6" width="4" height="60" fill="#8a8a86"/>
  <rect x="72" y="6" width="4" height="2" fill="#6a6a66"/>
  <rect x="72" y="64" width="4" height="2" fill="#6a6a66"/>

  <!-- "P" sign on wall -->
  <rect x="14" y="10" width="14" height="14" fill="#2a5090" rx="1"/>
  <rect x="18" y="14" width="4" height="6" fill="#f0f0e8"/>
  <rect x="18" y="14" width="6" height="2" fill="#f0f0e8"/>
  <rect x="22" y="16" width="2" height="2" fill="#f0f0e8"/>

  <!-- Caution wet floor sign cone (on right side wall) -->
  <rect x="56" y="14" width="10" height="6" fill="#d8c040" rx="1"/>
  <rect x="58" y="16" width="2" height="2" fill="#202020"/>
  <rect x="62" y="16" width="2" height="2" fill="#202020"/>

  <!-- SUV / boxy van — taller, fills more of the space -->
  <!-- Body (taller chassis) -->
  <rect x="10" y="50" width="60" height="20" fill="#d8a838" rx="3"/>
  <!-- Cabin top — flatter, boxier -->
  <rect x="14" y="42" width="52" height="12" fill="#b88828" rx="2"/>
  <!-- Front windshield -->
  <rect x="16" y="44" width="14" height="8" fill="#b8c8d0" opacity="0.9" rx="1"/>
  <!-- Side windows (split with B-pillar) -->
  <rect x="32" y="44" width="14" height="8" fill="#b8c8d0" opacity="0.9" rx="1"/>
  <rect x="48" y="44" width="14" height="8" fill="#b8c8d0" opacity="0.9" rx="1"/>
  <!-- Roof rack -->
  <rect x="20" y="40" width="40" height="2" fill="#604818"/>
  <rect x="22" y="38" width="2" height="2" fill="#604818"/>
  <rect x="56" y="38" width="2" height="2" fill="#604818"/>
  <!-- Headlight -->
  <rect x="10" y="56" width="5" height="4" fill="#f8f0a8" rx="1"/>
  <!-- Taillight -->
  <rect x="65" y="56" width="5" height="4" fill="#d04040" rx="1"/>
  <!-- Door lines -->
  <line x1="32" y1="56" x2="32" y2="68" stroke="#604818" stroke-width="0.5"/>
  <line x1="48" y1="56" x2="48" y2="68" stroke="#604818" stroke-width="0.5"/>
  <!-- Side trim -->
  <rect x="10" y="64" width="60" height="2" fill="#b88828"/>
  <!-- Wheels (larger — SUV) -->
  <circle cx="22" cy="70" r="5" fill="#181818"/>
  <circle cx="22" cy="70" r="2" fill="#707070"/>
  <circle cx="58" cy="70" r="5" fill="#181818"/>
  <circle cx="58" cy="70" r="2" fill="#707070"/>
</svg>
