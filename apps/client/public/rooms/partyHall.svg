  <rect x="451" y="116" width="3" height="14" fill="#406860"/>
  <rect x="456" y="116" width="3" height="14" fill="#804060"/>
  <rect x="461" y="116" width="3" height="14" fill="#206080"/>
  <rect x="466" y="116" width="3" height="14" fill="#a86040"/>
  <rect x="471" y="116" width="3" height="14" fill="#406860"/>
