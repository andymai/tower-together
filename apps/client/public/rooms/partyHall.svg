<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- Back wall - rich purple party hall -->
  <rect x="0" y="0" width="480" height="76" fill="#3a1a4a"/>

  <!-- Upper wall gradient (lighter near ceiling) -->
  <rect x="0" y="0" width="480" height="20" fill="#4a2060"/>

  <!-- Wainscoting trim -->
  <rect x="0" y="48" width="480" height="3" fill="#6a3080"/>

  <!-- Baseboard -->
  <rect x="0" y="72" width="480" height="4" fill="#201028"/>

  <!-- Dance floor -->
  <rect x="0" y="76" width="480" height="4" fill="#484058"/>
  <rect x="40" y="76" width="20" height="4" fill="#d0a848"/>
  <rect x="100" y="76" width="20" height="4" fill="#d0a848"/>
  <rect x="160" y="76" width="20" height="4" fill="#d0a848"/>
  <rect x="220" y="76" width="20" height="4" fill="#d0a848"/>
  <rect x="280" y="76" width="20" height="4" fill="#d0a848"/>
  <rect x="340" y="76" width="20" height="4" fill="#d0a848"/>
  <rect x="400" y="76" width="20" height="4" fill="#d0a848"/>

  <!-- Disco ball center -->
  <circle cx="240" cy="14" r="10" fill="#c8c8d0"/>
  <circle cx="240" cy="14" r="10" fill="url(#discoShine)" opacity="0.6"/>
  <!-- Disco facets -->
  <rect x="234" y="8" width="3" height="3" fill="#f0f0f8"/>
  <rect x="240" y="10" width="3" height="3" fill="#a0a0b0"/>
  <rect x="236" y="14" width="3" height="3" fill="#d0d0d8"/>
  <rect x="244" y="16" width="3" height="3" fill="#a0a0b0"/>
  <rect x="232" y="16" width="3" height="3" fill="#d0d0d8"/>
  <rect x="240" y="18" width="3" height="3" fill="#f0f0f8"/>
  <!-- Suspension rod -->
  <rect x="239" y="0" width="2" height="6" fill="#888898"/>
  <!-- Light beams -->
  <path d="M 240 24 L 210 60 L 218 60 Z" fill="#f0e080" opacity="0.2"/>
  <path d="M 240 24 L 270 60 L 262 60 Z" fill="#f0e080" opacity="0.2"/>
  <path d="M 240 24 L 180 76 L 196 76 Z" fill="#c088e0" opacity="0.15"/>
  <path d="M 240 24 L 300 76 L 284 76 Z" fill="#88c0e0" opacity="0.15"/>

  <!-- Wall speakers (left & right) -->
  <rect x="12" y="18" width="16" height="26" fill="#202030" rx="1"/>
  <circle cx="20" cy="26" r="4" fill="#404050"/>
  <circle cx="20" cy="26" r="2" fill="#202030"/>
  <circle cx="20" cy="36" r="3" fill="#404050"/>
  <circle cx="20" cy="36" r="1.5" fill="#202030"/>

  <rect x="452" y="18" width="16" height="26" fill="#202030" rx="1"/>
  <circle cx="460" cy="26" r="4" fill="#404050"/>
  <circle cx="460" cy="26" r="2" fill="#202030"/>
  <circle cx="460" cy="36" r="3" fill="#404050"/>
  <circle cx="460" cy="36" r="1.5" fill="#202030"/>

  <!-- Spotlights on ceiling -->
  <rect x="58" y="0" width="4" height="8" fill="#707080"/>
  <circle cx="60" cy="10" r="3" fill="#f0c048"/>
  <rect x="418" y="0" width="4" height="8" fill="#707080"/>
  <circle cx="420" cy="10" r="3" fill="#f0c048"/>
  <rect x="148" y="0" width="4" height="6" fill="#707080"/>
  <circle cx="150" cy="8" r="3" fill="#e08048"/>
  <rect x="328" y="0" width="4" height="6" fill="#707080"/>
  <circle cx="330" cy="8" r="3" fill="#e08048"/>

  <!-- DJ booth / bar (left side) -->
  <rect x="40" y="50" width="70" height="6" fill="#8a5a30" rx="1"/>
  <rect x="40" y="56" width="70" height="16" fill="#5a3418"/>
  <rect x="42" y="58" width="66" height="12" fill="#6a3a20" rx="1"/>
  <!-- Turntable -->
  <rect x="50" y="44" width="18" height="6" fill="#202020" rx="1"/>
  <circle cx="59" cy="47" r="2" fill="#404040"/>
  <rect x="76" y="44" width="18" height="6" fill="#202020" rx="1"/>
  <circle cx="85" cy="47" r="2" fill="#404040"/>
  <!-- Mixer between turntables -->
  <rect x="69" y="44" width="6" height="6" fill="#303038"/>
  <rect x="70" y="45" width="1" height="1" fill="#d04040"/>
  <rect x="72" y="45" width="1" height="1" fill="#40c040"/>
  <rect x="70" y="47" width="4" height="1" fill="#888"/>

  <!-- Dancing figures -->
  <!-- Dancer 1 -->
  <circle cx="130" cy="44" r="3" fill="#e8c8a0"/>
  <rect x="127" y="47" width="6" height="10" fill="#c04080"/>
  <rect x="127" y="57" width="2" height="10" fill="#3a2020"/>
  <rect x="131" y="57" width="2" height="10" fill="#3a2020"/>
  <rect x="124" y="48" width="3" height="7" fill="#c04080"/>
  <rect x="133" y="46" width="3" height="8" fill="#c04080"/>

  <!-- Dancer 2 -->
  <circle cx="160" cy="46" r="3" fill="#c89878"/>
  <rect x="157" y="49" width="6" height="10" fill="#4080c0"/>
  <rect x="157" y="59" width="2" height="10" fill="#202040"/>
  <rect x="161" y="59" width="2" height="10" fill="#202040"/>
  <rect x="154" y="50" width="3" height="7" fill="#4080c0"/>
  <rect x="163" y="48" width="3" height="8" fill="#4080c0"/>

  <!-- Dancer 3 -->
  <circle cx="192" cy="44" r="3" fill="#e8c8a0"/>
  <rect x="189" y="47" width="6" height="10" fill="#d0a030"/>
  <rect x="189" y="57" width="2" height="10" fill="#3a2820"/>
  <rect x="193" y="57" width="2" height="10" fill="#3a2820"/>
  <rect x="186" y="46" width="3" height="8" fill="#d0a030"/>
  <rect x="195" y="48" width="3" height="7" fill="#d0a030"/>

  <!-- Dancer 4 (arm up) -->
  <circle cx="220" cy="44" r="3" fill="#c89878"/>
  <rect x="217" y="47" width="6" height="10" fill="#60a060"/>
  <rect x="217" y="57" width="2" height="10" fill="#2a3020"/>
  <rect x="221" y="57" width="2" height="10" fill="#2a3020"/>
  <rect x="214" y="48" width="3" height="7" fill="#60a060"/>
  <rect x="223" y="40" width="3" height="12" fill="#60a060"/>

  <!-- Dancer 5 -->
  <circle cx="262" cy="44" r="3" fill="#e8c8a0"/>
  <rect x="259" y="47" width="6" height="10" fill="#8040a0"/>
  <rect x="259" y="57" width="2" height="10" fill="#201028"/>
  <rect x="263" y="57" width="2" height="10" fill="#201028"/>
  <rect x="256" y="40" width="3" height="12" fill="#8040a0"/>
  <rect x="265" y="48" width="3" height="7" fill="#8040a0"/>

  <!-- Dancer 6 -->
  <circle cx="290" cy="46" r="3" fill="#b08068"/>
  <rect x="287" y="49" width="6" height="10" fill="#d03050"/>
  <rect x="287" y="59" width="2" height="10" fill="#2a1818"/>
  <rect x="291" y="59" width="2" height="10" fill="#2a1818"/>
  <rect x="284" y="50" width="3" height="7" fill="#d03050"/>
  <rect x="293" y="50" width="3" height="7" fill="#d03050"/>

  <!-- Dancer 7 -->
  <circle cx="318" cy="44" r="3" fill="#d0a888"/>
  <rect x="315" y="47" width="6" height="10" fill="#4060a0"/>
  <rect x="315" y="57" width="2" height="10" fill="#1a2030"/>
  <rect x="319" y="57" width="2" height="10" fill="#1a2030"/>
  <rect x="312" y="46" width="3" height="8" fill="#4060a0"/>
  <rect x="321" y="48" width="3" height="7" fill="#4060a0"/>

  <!-- Dancer 8 -->
  <circle cx="348" cy="46" r="3" fill="#e0c09a"/>
  <rect x="345" y="49" width="6" height="10" fill="#c0a030"/>
  <rect x="345" y="59" width="2" height="10" fill="#3a2a18"/>
  <rect x="349" y="59" width="2" height="10" fill="#3a2a18"/>
  <rect x="351" y="40" width="3" height="12" fill="#c0a030"/>
  <rect x="342" y="50" width="3" height="7" fill="#c0a030"/>

  <!-- Bar counter (right side) -->
  <rect x="380" y="50" width="60" height="6" fill="#8a5a30" rx="1"/>
  <rect x="380" y="56" width="60" height="16" fill="#5a3418"/>
  <rect x="382" y="58" width="56" height="12" fill="#6a3a20" rx="1"/>
  <!-- Bottles behind bar -->
  <rect x="386" y="36" width="3" height="14" fill="#a86040"/>
  <rect x="391" y="36" width="3" height="14" fill="#406860"/>
  <rect x="396" y="36" width="3" height="14" fill="#804060"/>
  <rect x="401" y="36" width="3" height="14" fill="#206080"/>
  <rect x="406" y="36" width="3" height="14" fill="#a86040"/>
  <rect x="411" y="36" width="3" height="14" fill="#406860"/>
  <!-- Cocktail glasses on bar -->
  <path d="M 420 46 L 428 46 L 425 52 L 423 52 Z" fill="#e0a0c0" opacity="0.85"/>
  <rect x="423" y="52" width="2" height="4" fill="#e0a0c0"/>
  <path d="M 430 46 L 438 46 L 435 52 L 433 52 Z" fill="#a0c0e0" opacity="0.85"/>
  <rect x="433" y="52" width="2" height="4" fill="#a0c0e0"/>
</svg>
