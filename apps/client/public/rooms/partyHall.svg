  <path d="M 480 126 L 488 126 L 485 132 L 483 132 Z" fill="#e0a0c0" opacity="0.85"/>
  <rect x="483" y="132" width="2" height="4" fill="#e0a0c0"/>
  <path d="M 490 126 L 498 126 L 495 132 L 493 132 Z" fill="#a0c0e0" opacity="0.85"/>
  <rect x="493" y="132" width="2" height="4" fill="#a0c0e0"/>
