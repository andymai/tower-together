  <rect x="411" y="129" width="6" height="10" fill="#a04060"/>
  <rect x="411" y="139" width="2" height="10" fill="#2a1820"/>
  <rect x="415" y="139" width="2" height="10" fill="#2a1820"/>
  <rect x="417" y="122" width="3" height="12" fill="#a04060"/>
