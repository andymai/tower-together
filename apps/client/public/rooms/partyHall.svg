  <rect x="381" y="127" width="6" height="10" fill="#3068a8"/>
  <rect x="381" y="137" width="2" height="10" fill="#18202a"/>
  <rect x="385" y="137" width="2" height="10" fill="#18202a"/>
  <rect x="378" y="128" width="3" height="7" fill="#3068a8"/>
  <rect x="387" y="126" width="3" height="8" fill="#3068a8"/>

