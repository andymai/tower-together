<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="500" height="160">
  <!-- Industrial back wall: concrete panels -->
  <rect x="0" y="0" width="500" height="152" fill="#9a9690"/>
  <!-- Vertical panel seams -->
  <g stroke="#7a7670" stroke-width="1" opacity="0.7">
    <line x1="50" y1="0" x2="50" y2="152"/>
    <line x1="100" y1="0" x2="100" y2="152"/>
    <line x1="150" y1="0" x2="150" y2="152"/>
    <line x1="200" y1="0" x2="200" y2="152"/>
    <line x1="250" y1="0" x2="250" y2="152"/>
    <line x1="300" y1="0" x2="300" y2="152"/>
    <line x1="350" y1="0" x2="350" y2="152"/>
    <line x1="400" y1="0" x2="400" y2="152"/>
    <line x1="450" y1="0" x2="450" y2="152"/>
  </g>

  <!-- Clerestory windows (upper row of industrial windows) -->
  <g>
    <rect x="30" y="10" width="50" height="20" fill="#2a3840" rx="1"/>
    <rect x="32" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="56" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="30" y="19" width="50" height="2" fill="#2a3840"/>
    <rect x="54" y="10" width="2" height="20" fill="#2a3840"/>

    <rect x="130" y="10" width="50" height="20" fill="#2a3840" rx="1"/>
    <rect x="132" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="156" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="130" y="19" width="50" height="2" fill="#2a3840"/>
    <rect x="154" y="10" width="2" height="20" fill="#2a3840"/>

    <rect x="230" y="10" width="50" height="20" fill="#2a3840" rx="1"/>
    <rect x="232" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="256" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="230" y="19" width="50" height="2" fill="#2a3840"/>
    <rect x="254" y="10" width="2" height="20" fill="#2a3840"/>

    <rect x="330" y="10" width="50" height="20" fill="#2a3840" rx="1"/>
    <rect x="332" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="356" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="330" y="19" width="50" height="2" fill="#2a3840"/>
    <rect x="354" y="10" width="2" height="20" fill="#2a3840"/>

    <rect x="430" y="10" width="50" height="20" fill="#2a3840" rx="1"/>
    <rect x="432" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="456" y="12" width="22" height="16" fill="#6088a0"/>
    <rect x="430" y="19" width="50" height="2" fill="#2a3840"/>
    <rect x="454" y="10" width="2" height="20" fill="#2a3840"/>
  </g>

  <!-- Upper catwalk / mezzanine -->
  <rect x="0" y="60" width="500" height="4" fill="#484440"/>
  <rect x="0" y="64" width="500" height="2" fill="#303028"/>
  <!-- Catwalk railing -->
  <rect x="0" y="52" width="500" height="2" fill="#585048"/>
  <g fill="#585048">
    <rect x="20" y="54" width="2" height="8"/>
    <rect x="60" y="54" width="2" height="8"/>
    <rect x="100" y="54" width="2" height="8"/>
    <rect x="140" y="54" width="2" height="8"/>
    <rect x="180" y="54" width="2" height="8"/>
    <rect x="220" y="54" width="2" height="8"/>
    <rect x="260" y="54" width="2" height="8"/>
    <rect x="300" y="54" width="2" height="8"/>
    <rect x="340" y="54" width="2" height="8"/>
    <rect x="380" y="54" width="2" height="8"/>
    <rect x="420" y="54" width="2" height="8"/>
    <rect x="460" y="54" width="2" height="8"/>
  </g>

  <!-- Overhead pipes and ducts -->
  <rect x="0" y="38" width="500" height="4" fill="#a09078"/>
  <g fill="#909078">
    <rect x="20" y="42" width="3" height="10"/>
    <rect x="120" y="42" width="3" height="10"/>
    <rect x="220" y="42" width="3" height="10"/>
    <rect x="320" y="42" width="3" height="10"/>
    <rect x="420" y="42" width="3" height="10"/>
  </g>
  <rect x="0" y="46" width="500" height="3" fill="#807060"/>

  <!-- Hanging industrial lamps -->
  <g>
    <rect x="74" y="42" width="2" height="6" fill="#404040"/>
    <path d="M 66 48 L 84 48 L 80 56 L 70 56 Z" fill="#707068"/>
    <ellipse cx="75" cy="54" rx="6" ry="1.5" fill="#f8e890"/>
  </g>
  <g>
    <rect x="174" y="42" width="2" height="6" fill="#404040"/>
    <path d="M 166 48 L 184 48 L 180 56 L 170 56 Z" fill="#707068"/>
    <ellipse cx="175" cy="54" rx="6" ry="1.5" fill="#f8e890"/>
  </g>
  <g>
    <rect x="274" y="42" width="2" height="6" fill="#404040"/>
    <path d="M 266 48 L 284 48 L 280 56 L 270 56 Z" fill="#707068"/>
    <ellipse cx="275" cy="54" rx="6" ry="1.5" fill="#f8e890"/>
  </g>
  <g>
    <rect x="374" y="42" width="2" height="6" fill="#404040"/>
    <path d="M 366 48 L 384 48 L 380 56 L 370 56 Z" fill="#707068"/>
    <ellipse cx="375" cy="54" rx="6" ry="1.5" fill="#f8e890"/>
  </g>
  <g>
    <rect x="474" y="42" width="2" height="6" fill="#404040"/>
    <path d="M 466 48 L 484 48 L 480 56 L 470 56 Z" fill="#707068"/>
    <ellipse cx="475" cy="54" rx="6" ry="1.5" fill="#f8e890"/>
  </g>

  <!-- Floor divider line (separating upper/lower tower floor) -->
  <rect x="0" y="76" width="500" height="2" fill="#484040"/>

  <!-- Lower floor back wall (slightly darker) -->
  <rect x="0" y="78" width="500" height="74" fill="#807c76"/>
  <!-- Panel seams continued -->
  <g stroke="#605c56" stroke-width="1" opacity="0.7">
    <line x1="50" y1="78" x2="50" y2="152"/>
    <line x1="100" y1="78" x2="100" y2="152"/>
    <line x1="150" y1="78" x2="150" y2="152"/>
    <line x1="200" y1="78" x2="200" y2="152"/>
    <line x1="250" y1="78" x2="250" y2="152"/>
    <line x1="300" y1="78" x2="300" y2="152"/>
    <line x1="350" y1="78" x2="350" y2="152"/>
    <line x1="400" y1="78" x2="400" y2="152"/>
    <line x1="450" y1="78" x2="450" y2="152"/>
  </g>

  <!-- Recycling symbol painted on back wall -->
  <g transform="translate(240, 90)" opacity="0.5">
    <circle cx="10" cy="10" r="18" fill="none" stroke="#508058" stroke-width="2"/>
    <path d="M 4 6 L 10 2 L 16 8 L 13 10 L 10 7 L 6 14 Z" fill="#508058"/>
    <path d="M 16 16 L 14 22 L 6 20 L 6 16 L 10 16 L 12 13 Z" fill="#508058"/>
    <path d="M 6 14 L 2 14 L 0 8 L 4 6 L 6 9 L 8 12 Z" fill="#508058"/>
  </g>

  <!-- Loading bay garage doors (large sectional doors) -->
  <g>
    <!-- Left bay -->
    <rect x="40" y="86" width="100" height="58" fill="#6a8898" rx="1"/>
    <rect x="40" y="86" width="100" height="2" fill="#4a6878"/>
    <rect x="40" y="98" width="100" height="1" fill="#4a6878"/>
    <rect x="40" y="110" width="100" height="1" fill="#4a6878"/>
    <rect x="40" y="122" width="100" height="1" fill="#4a6878"/>
    <rect x="40" y="134" width="100" height="1" fill="#4a6878"/>
    <!-- Handle -->
    <rect x="86" y="115" width="8" height="3" fill="#303038"/>
  </g>
  <g>
    <!-- Right bay -->
    <rect x="360" y="86" width="100" height="58" fill="#6a8898" rx="1"/>
    <rect x="360" y="86" width="100" height="2" fill="#4a6878"/>
    <rect x="360" y="98" width="100" height="1" fill="#4a6878"/>
    <rect x="360" y="110" width="100" height="1" fill="#4a6878"/>
    <rect x="360" y="122" width="100" height="1" fill="#4a6878"/>
    <rect x="360" y="134" width="100" height="1" fill="#4a6878"/>
    <rect x="406" y="115" width="8" height="3" fill="#303038"/>
  </g>

  <!-- Bay warning stripes on floor -->
  <g>
    <rect x="40" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="50" y="144" width="10" height="8" fill="#2a2a2a"/>
    <rect x="60" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="70" y="144" width="10" height="8" fill="#2a2a2a"/>
    <rect x="80" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="90" y="144" width="10" height="8" fill="#2a2a2a"/>
    <rect x="100" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="110" y="144" width="10" height="8" fill="#2a2a2a"/>
    <rect x="120" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="130" y="144" width="10" height="8" fill="#2a2a2a"/>

    <rect x="360" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="370" y="144" width="10" height="8" fill="#2a2a2a"/>
    <rect x="380" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="390" y="144" width="10" height="8" fill="#2a2a2a"/>
    <rect x="400" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="410" y="144" width="10" height="8" fill="#2a2a2a"/>
    <rect x="420" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="430" y="144" width="10" height="8" fill="#2a2a2a"/>
    <rect x="440" y="144" width="10" height="8" fill="#d8c040"/>
    <rect x="450" y="144" width="10" height="8" fill="#2a2a2a"/>
  </g>

  <!-- Baseboard / concrete toe -->
  <rect x="0" y="150" width="500" height="2" fill="#40403a"/>

  <!-- Floor -->
  <rect x="0" y="152" width="500" height="8" fill="#6a6862"/>
  <!-- Floor dividing line markings -->
  <rect x="160" y="155" width="180" height="1" fill="#b8b0a0" opacity="0.6"/>

  <!-- Sorting area outline on floor (tape markings) -->
  <g stroke="#d8d040" stroke-width="1" fill="none" opacity="0.8">
    <rect x="162" y="132" width="80" height="20"/>
    <rect x="258" y="132" width="80" height="20"/>
  </g>
</svg>
