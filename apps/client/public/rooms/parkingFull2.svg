<svg preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Back wall - concrete garage -->
  <rect x="0" y="0" width="80" height="72" fill="#7a7a76"/>

  <!-- Concrete panel seams -->
  <rect x="0" y="32" width="80" height="1" fill="#585854"/>
  <rect x="40" y="0" width="1" height="32" fill="#585854"/>

  <!-- Baseboard -->
  <rect x="0" y="72" width="80" height="4" fill="#484844"/>

  <!-- Floor - asphalt -->
  <rect x="0" y="76" width="80" height="4" fill="#484844"/>
  <!-- Parking space division stripes -->
  <rect x="2" y="76" width="2" height="4" fill="#d8c040"/>
  <rect x="76" y="76" width="2" height="4" fill="#d8c040"/>

  <!-- Ceiling fluorescent -->
  <rect x="20" y="0" width="40" height="3" fill="#c8c8b8"/>
  <rect x="24" y="3" width="32" height="2" fill="#a8a8a0"/>

  <!-- Support pillars -->
  <rect x="4" y="6" width="4" height="60" fill="#8a8a86"/>
  <rect x="4" y="6" width="4" height="2" fill="#6a6a66"/>
  <rect x="4" y="64" width="4" height="2" fill="#6a6a66"/>
  <rect x="72" y="6" width="4" height="60" fill="#8a8a86"/>
  <rect x="72" y="6" width="4" height="2" fill="#6a6a66"/>
  <rect x="72" y="64" width="4" height="2" fill="#6a6a66"/>

  <!-- "P" sign on wall -->
  <rect x="14" y="10" width="14" height="14" fill="#2a5090" rx="1"/>
  <rect x="18" y="14" width="4" height="6" fill="#f0f0e8"/>
  <rect x="18" y="14" width="6" height="2" fill="#f0f0e8"/>
  <rect x="22" y="16" width="2" height="2" fill="#f0f0e8"/>

  <!-- Exit sign (green) -->
  <rect x="52" y="12" width="16" height="8" fill="#306030" rx="1"/>
  <rect x="55" y="14" width="2" height="4" fill="#e0e8d8"/>
  <rect x="55" y="14" width="4" height="2" fill="#e0e8d8"/>
  <rect x="55" y="16" width="3" height="2" fill="#e0e8d8"/>
  <rect x="60" y="14" width="2" height="4" fill="#e0e8d8"/>
  <rect x="60" y="16" width="3" height="2" fill="#e0e8d8"/>
  <rect x="60" y="14" width="4" height="2" fill="#e0e8d8"/>

  <!-- Blue sedan, sleeker profile -->
  <!-- Body -->
  <rect x="10" y="56" width="60" height="14" fill="#284878" rx="4"/>
  <!-- Cabin (longer, lower) -->
  <rect x="20" y="48" width="40" height="12" fill="#1c3458" rx="4"/>
  <!-- Windshield (front) -->
  <rect x="22" y="50" width="14" height="8" fill="#a8c0d8" opacity="0.9" rx="1"/>
  <!-- Side window -->
  <rect x="38" y="50" width="6" height="8" fill="#a8c0d8" opacity="0.9" rx="1"/>
  <!-- Windshield (rear) -->
  <rect x="46" y="50" width="12" height="8" fill="#a8c0d8" opacity="0.9" rx="1"/>
  <!-- Trim line -->
  <rect x="10" y="63" width="60" height="1" fill="#1c3458"/>
  <!-- Headlight -->
  <rect x="10" y="59" width="4" height="3" fill="#f8f0a8" rx="1"/>
  <!-- Taillight -->
  <rect x="66" y="59" width="4" height="3" fill="#d04040" rx="1"/>
  <!-- Door line -->
  <line x1="40" y1="60" x2="40" y2="68" stroke="#101828" stroke-width="0.5"/>
  <!-- Wheels -->
  <circle cx="22" cy="70" r="4" fill="#202020"/>
  <circle cx="22" cy="70" r="2" fill="#808080"/>
  <circle cx="58" cy="70" r="4" fill="#202020"/>
  <circle cx="58" cy="70" r="2" fill="#808080"/>
</svg>
