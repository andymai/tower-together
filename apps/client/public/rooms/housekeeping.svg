<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <!-- Back wall - soft teal utility room -->
  <rect x="0" y="0" width="300" height="76" fill="#aab8b0"/>

  <!-- Tile accent band -->
  <rect x="0" y="30" width="300" height="2" fill="#889890"/>

  <!-- Baseboard -->
  <rect x="0" y="72" width="300" height="4" fill="#607068"/>

  <!-- Floor - linoleum -->
  <rect x="0" y="76" width="300" height="4" fill="#889890"/>

  <!-- Fluorescent tube ceiling lights -->
  <rect x="40" y="0" width="40" height="3" fill="#d8e0d4"/>
  <rect x="44" y="3" width="32" height="2" fill="#b8c0b4"/>
  <rect x="140" y="0" width="40" height="3" fill="#d8e0d4"/>
  <rect x="144" y="3" width="32" height="2" fill="#b8c0b4"/>
  <rect x="240" y="0" width="40" height="3" fill="#d8e0d4"/>
  <rect x="244" y="3" width="32" height="2" fill="#b8c0b4"/>

  <!-- Shelving unit with linens (left) -->
  <rect x="6" y="14" width="56" height="58" fill="#686058" rx="1"/>
  <rect x="8" y="16" width="52" height="12" fill="#787068"/>
  <rect x="8" y="30" width="52" height="12" fill="#787068"/>
  <rect x="8" y="44" width="52" height="12" fill="#787068"/>
  <rect x="8" y="58" width="52" height="12" fill="#787068"/>
  <!-- Folded towels -->
  <rect x="10" y="18" width="12" height="8" fill="#f0f0e8" rx="1"/>
  <rect x="11" y="21" width="10" height="1" fill="#d8d8c8"/>
  <rect x="24" y="18" width="12" height="8" fill="#e0c8b8" rx="1"/>
  <rect x="25" y="21" width="10" height="1" fill="#c8b098"/>
  <rect x="38" y="18" width="12" height="8" fill="#c8d8d8" rx="1"/>
  <rect x="39" y="21" width="10" height="1" fill="#a8b8b8"/>
  <rect x="10" y="32" width="12" height="8" fill="#e0c8b8" rx="1"/>
  <rect x="24" y="32" width="12" height="8" fill="#f0f0e8" rx="1"/>
  <rect x="38" y="32" width="12" height="8" fill="#e0c8b8" rx="1"/>
  <!-- Sheets folded -->
  <rect x="10" y="46" width="22" height="8" fill="#f0f0e8" rx="1"/>
  <rect x="11" y="49" width="20" height="1" fill="#d8d8c8"/>
  <rect x="34" y="46" width="22" height="8" fill="#c8d8d8" rx="1"/>
  <!-- Bottom shelf - supplies -->
  <rect x="10" y="60" width="6" height="8" fill="#d04040" rx="1"/>
  <rect x="18" y="60" width="6" height="8" fill="#4080c0" rx="1"/>
  <rect x="26" y="60" width="6" height="8" fill="#d8c040" rx="1"/>
  <rect x="34" y="60" width="6" height="8" fill="#60a060" rx="1"/>
  <rect x="42" y="60" width="6" height="8" fill="#d04040" rx="1"/>
  <rect x="50" y="60" width="8" height="8" fill="#8060a0" rx="1"/>

  <!-- Cleaning cart (center-left) -->
  <rect x="74" y="52" width="40" height="18" fill="#d0d0c8" rx="2"/>
  <rect x="76" y="54" width="36" height="4" fill="#b8b8b0"/>
  <!-- Trash bag in cart -->
  <rect x="78" y="42" width="16" height="14" fill="#303030" rx="2"/>
  <rect x="80" y="40" width="12" height="4" fill="#303030" rx="2"/>
  <!-- Cleaning supplies bins -->
  <rect x="96" y="46" width="6" height="10" fill="#4080c0" rx="1"/>
  <rect x="104" y="46" width="6" height="10" fill="#d04040" rx="1"/>
  <!-- Cart handle -->
  <rect x="70" y="48" width="2" height="16" fill="#a0a098"/>
  <rect x="68" y="46" width="6" height="3" fill="#808078"/>
  <!-- Cart wheels -->
  <circle cx="80" cy="72" r="2" fill="#303030"/>
  <circle cx="108" cy="72" r="2" fill="#303030"/>

  <!-- Mop & bucket (center) -->
  <rect x="126" y="54" width="16" height="16" fill="#4080c0" rx="1"/>
  <rect x="128" y="56" width="12" height="4" fill="#60a0d8"/>
  <!-- Water inside -->
  <rect x="129" y="58" width="10" height="3" fill="#80c0e0" opacity="0.7"/>
  <!-- Bucket wringer -->
  <rect x="126" y="50" width="16" height="4" fill="#303838" rx="1"/>
  <!-- Mop handle -->
  <rect x="147" y="14" width="2" height="54" fill="#a08068"/>
  <!-- Mop head -->
  <rect x="142" y="58" width="12" height="4" fill="#e8e0c8"/>
  <g stroke="#d8d0b8" stroke-width="1">
    <line x1="143" y1="62" x2="143" y2="70"/>
    <line x1="145" y1="62" x2="145" y2="71"/>
    <line x1="147" y1="62" x2="147" y2="70"/>
    <line x1="149" y1="62" x2="149" y2="71"/>
    <line x1="151" y1="62" x2="151" y2="70"/>
    <line x1="153" y1="62" x2="153" y2="71"/>
  </g>

  <!-- Laundry machines (right-center) -->
  <rect x="164" y="38" width="28" height="34" fill="#d8d8d0" rx="1"/>
  <rect x="166" y="40" width="24" height="4" fill="#b8b8b0"/>
  <circle cx="178" cy="58" r="10" fill="#909088"/>
  <circle cx="178" cy="58" r="8" fill="#505058"/>
  <circle cx="178" cy="58" r="6" fill="#303038"/>
  <!-- Clothes seen through window -->
  <rect x="174" y="54" width="4" height="4" fill="#c04040" opacity="0.8"/>
  <rect x="178" y="58" width="3" height="3" fill="#4080c0" opacity="0.8"/>
  <!-- Controls -->
  <circle cx="170" cy="42" r="1.5" fill="#303030"/>
  <circle cx="175" cy="42" r="1" fill="#d04040"/>
  <circle cx="180" cy="42" r="1" fill="#60c080"/>

  <rect x="196" y="38" width="28" height="34" fill="#d8d8d0" rx="1"/>
  <rect x="198" y="40" width="24" height="4" fill="#b8b8b0"/>
  <circle cx="210" cy="58" r="10" fill="#909088"/>
  <circle cx="210" cy="58" r="8" fill="#505058"/>
  <circle cx="210" cy="58" r="6" fill="#303038"/>
  <rect x="206" y="54" width="4" height="4" fill="#e0c040" opacity="0.8"/>
  <rect x="210" y="60" width="3" height="3" fill="#60a060" opacity="0.8"/>
  <circle cx="202" cy="42" r="1.5" fill="#303030"/>
  <circle cx="207" cy="42" r="1" fill="#d04040"/>
  <circle cx="212" cy="42" r="1" fill="#60c080"/>

  <!-- Laundry hamper / basket -->
  <rect x="230" y="54" width="24" height="18" fill="#b89868" rx="2"/>
  <g stroke="#886840" stroke-width="1">
    <line x1="232" y1="56" x2="232" y2="70"/>
    <line x1="236" y1="56" x2="236" y2="70"/>
    <line x1="240" y1="56" x2="240" y2="70"/>
    <line x1="244" y1="56" x2="244" y2="70"/>
    <line x1="248" y1="56" x2="248" y2="70"/>
    <line x1="252" y1="56" x2="252" y2="70"/>
  </g>
  <!-- Clothes piled in basket -->
  <path d="M 230 54 Q 236 48 242 52 Q 248 46 254 54 Z" fill="#f0f0e8"/>
  <path d="M 234 54 Q 238 50 242 54" stroke="#c04040" stroke-width="2" fill="none"/>

  <!-- Uniforms / aprons hanging on wall (right) -->
  <rect x="262" y="18" width="2" height="48" fill="#a09088"/>
  <!-- Hanger 1 -->
  <rect x="258" y="18" width="10" height="1" fill="#888"/>
  <path d="M 260 19 L 260 32 L 266 32 L 266 19" stroke="#4080a0" stroke-width="0" fill="#4080a0"/>
  <rect x="258" y="22" width="10" height="14" fill="#4080a0" rx="1"/>
  <!-- Hanger 2 -->
  <rect x="270" y="18" width="10" height="1" fill="#888"/>
  <rect x="270" y="22" width="10" height="14" fill="#c04040" rx="1"/>
  <!-- Hanger 3 -->
  <rect x="282" y="18" width="10" height="1" fill="#888"/>
  <rect x="282" y="22" width="10" height="14" fill="#60a060" rx="1"/>

  <!-- Trash bin -->
  <rect x="272" y="56" width="14" height="16" fill="#505050" rx="1"/>
  <rect x="270" y="54" width="18" height="3" fill="#404040" rx="1"/>
  <rect x="274" y="58" width="10" height="2" fill="#606060"/>

  <!-- Clock -->
  <circle cx="100" cy="16" r="7" fill="#d8d8d0"/>
  <circle cx="100" cy="16" r="6" fill="#f0f0e8"/>
  <line x1="100" y1="16" x2="100" y2="12" stroke="#303030" stroke-width="1"/>
  <line x1="100" y1="16" x2="103" y2="17" stroke="#303030" stroke-width="1"/>
</svg>
