<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <!--
    Bounds match the stairs parallelogram used in GameScene.drawStairs:
    width  = TILE_WIDTHS.stairs * TILE_WIDTH (8 tiles)
    height = TILE_HEIGHT + TILE_HEIGHT/3 (floor to 1/3 up next floor)
    edgeW  = width / 6  → 40 in this viewBox
    Bottom edge is at y=160 (lower floor line); top edge at y=0 (1/3 up upper floor).
  -->
  <defs>
    <linearGradient id="stairFill" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8d2c4"/>
      <stop offset="100%" stop-color="#f3ecdb"/>
    </linearGradient>
  </defs>

  <!-- Parallelogram body -->
  <polygon points="0,160 40,160 240,0 200,0"
           fill="url(#stairFill)" stroke="#3a3024" stroke-width="2"
           stroke-linejoin="miter"/>

  <!-- Eight stair treads (horizontal segments) rising along the diagonal.
       Each step advances 25 units horizontally and 20 units vertically. -->
  <g stroke="#3a3024" stroke-width="1.75" stroke-linecap="square" fill="none">
    <line x1="25"  y1="140" x2="65"  y2="140"/>
    <line x1="50"  y1="120" x2="90"  y2="120"/>
    <line x1="75"  y1="100" x2="115" y2="100"/>
    <line x1="100" y1="80"  x2="140" y2="80"/>
    <line x1="125" y1="60"  x2="165" y2="60"/>
    <line x1="150" y1="40"  x2="190" y2="40"/>
    <line x1="175" y1="20"  x2="215" y2="20"/>
  </g>

  <!-- Risers (short vertical segments connecting treads) for depth -->
  <g stroke="#8a7a5e" stroke-width="1.25" fill="none">
    <line x1="25"  y1="160" x2="25"  y2="140"/>
    <line x1="50"  y1="140" x2="50"  y2="120"/>
    <line x1="75"  y1="120" x2="75"  y2="100"/>
    <line x1="100" y1="100" x2="100" y2="80"/>
    <line x1="125" y1="80"  x2="125" y2="60"/>
    <line x1="150" y1="60"  x2="150" y2="40"/>
    <line x1="175" y1="40"  x2="175" y2="20"/>
    <line x1="200" y1="20"  x2="200" y2="0"/>
  </g>
</svg>
