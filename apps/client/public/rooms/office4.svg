<svg preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 80" width="180" height="80">
  <!-- Cubicle farm -->

  <!-- Back wall -->
  <rect x="0" y="0" width="180" height="76" fill="#9aacbb"/>

  <!-- Baseboard -->
  <rect x="0" y="72" width="180" height="4" fill="#7a8c9c"/>

  <!-- Floor -->
