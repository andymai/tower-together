  <rect x="88" y="34" width="3" height="38" fill="#a8b8c4" rx="1"/>
  <rect x="88" y="34" width="3" height="3" fill="#7a8c9c" rx="1"/>
  <rect x="138" y="34" width="3" height="38" fill="#a8b8c4" rx="1"/>
  <rect x="138" y="34" width="3" height="3" fill="#7a8c9c" rx="1"/>

