  <!-- Ceiling lights -->
  <rect x="20" y="0" width="16" height="3" fill="#b8c8d4" rx="1"/>
  <rect x="24" y="3" width="8" height="2" fill="#ccdae4"/>
  <rect x="82" y="0" width="16" height="3" fill="#b8c8d4" rx="1"/>
  <rect x="86" y="3" width="8" height="2" fill="#ccdae4"/>
