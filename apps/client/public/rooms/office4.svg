  <rect x="66" y="58" width="12" height="10" fill="#506878" rx="2"/>
  <rect x="67" y="56" width="10" height="4" fill="#485e6e" rx="2"/>
  <rect x="70" y="68" width="4" height="4" fill="#4a5c6c"/>
  <rect x="66" y="71" width="12" height="2" fill="#4a5c6c" rx="1"/>

  <!-- Cubicle 3 -->
  <rect x="104" y="54" width="34" height="4" fill="#6e8090" rx="1"/>
  <rect x="106" y="58" width="3" height="14" fill="#5e7080"/>
  <rect x="133" y="58" width="3" height="14" fill="#5e7080"/>
  <rect x="112" y="42" width="16" height="12" fill="#4a5e6e" rx="1"/>
  <rect x="113" y="43" width="14" height="9" fill="#6a8ea8" rx="1"/>
  <rect x="118" y="54" width="4" height="2" fill="#4a5e6e"/>
  <rect x="108" y="52" width="10" height="2" fill="#566a7a" rx="1"/>
