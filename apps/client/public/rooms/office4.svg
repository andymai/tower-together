  <rect x="130" y="48" width="5" height="5" fill="#e4d48a"/>
  <rect x="130" y="42" width="5" height="5" fill="#c4e4a8"/>
  <rect x="116" y="58" width="12" height="10" fill="#506878" rx="2"/>
  <rect x="117" y="56" width="10" height="4" fill="#485e6e" rx="2"/>
  <rect x="120" y="68" width="4" height="4" fill="#4a5c6c"/>
  <rect x="116" y="71" width="12" height="2" fill="#4a5c6c" rx="1"/>

  <!-- Cubicle 4 (right) -->
  <rect x="154" y="54" width="22" height="4" fill="#6e8090" rx="1"/>
  <rect x="155" y="58" width="3" height="14" fill="#5e7080"/>
  <rect x="172" y="58" width="3" height="14" fill="#5e7080"/>
  <rect x="158" y="42" width="16" height="12" fill="#4a5e6e" rx="1"/>
  <rect x="159" y="43" width="14" height="9" fill="#6a8ea8" rx="1"/>
  <rect x="164" y="54" width="4" height="2" fill="#4a5e6e"/>
  <rect x="154" y="52" width="10" height="2" fill="#566a7a" rx="1"/>
  <rect x="160" y="58" width="12" height="10" fill="#506878" rx="2"/>
  <rect x="161" y="56" width="10" height="4" fill="#485e6e" rx="2"/>
  <rect x="164" y="68" width="4" height="4" fill="#4a5c6c"/>
  <rect x="160" y="71" width="12" height="2" fill="#4a5c6c" rx="1"/>
