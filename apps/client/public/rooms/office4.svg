  <rect x="63" y="43" width="14" height="9" fill="#6a8ea8" rx="1"/>
  <rect x="68" y="54" width="4" height="2" fill="#4a5e6e"/>
  <rect x="58" y="52" width="10" height="2" fill="#566a7a" rx="1"/>
