  <rect x="4" y="54" width="34" height="4" fill="#6e8090" rx="1"/>
  <rect x="6" y="58" width="3" height="14" fill="#5e7080"/>
  <rect x="33" y="58" width="3" height="14" fill="#5e7080"/>
