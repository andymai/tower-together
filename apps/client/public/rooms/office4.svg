  <rect x="40" y="34" width="10" height="18" fill="#6e8090" rx="1"/>
  <rect x="41" y="36" width="8" height="3" fill="#8a9cac"/>
  <rect x="41" y="40" width="8" height="3" fill="#8a9cac"/>
  <rect x="41" y="44" width="8" height="3" fill="#8a9cac"/>
  <rect x="44" y="37" width="2" height="1" fill="#3a4654"/>
  <rect x="44" y="41" width="2" height="1" fill="#3a4654"/>
  <rect x="44" y="45" width="2" height="1" fill="#3a4654"/>

  <rect x="130" y="34" width="10" height="18" fill="#6e8090" rx="1"/>
  <rect x="131" y="36" width="8" height="3" fill="#8a9cac"/>
  <rect x="131" y="40" width="8" height="3" fill="#8a9cac"/>
  <rect x="131" y="44" width="8" height="3" fill="#8a9cac"/>
  <rect x="134" y="37" width="2" height="1" fill="#3a4654"/>
  <rect x="134" y="41" width="2" height="1" fill="#3a4654"/>
  <rect x="134" y="45" width="2" height="1" fill="#3a4654"/>

