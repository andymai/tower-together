<svg preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <!-- Back wall - soft cream retail space -->
  <rect x="0" y="0" width="240" height="76" fill="#e0d4b8"/>

  <!-- Baseboard -->
  <rect x="0" y="72" width="240" height="4" fill="#a8987a"/>

  <!-- Floor - polished wood -->
  <rect x="0" y="76" width="240" height="4" fill="#b89878"/>

  <!-- Track lighting -->
  <rect x="0" y="0" width="240" height="3" fill="#888078"/>
  <circle cx="30" cy="5" r="2" fill="#f0e0a8"/>
  <circle cx="70" cy="5" r="2" fill="#f0e0a8"/>
  <circle cx="110" cy="5" r="2" fill="#f0e0a8"/>
  <circle cx="150" cy="5" r="2" fill="#f0e0a8"/>
  <circle cx="190" cy="5" r="2" fill="#f0e0a8"/>
  <circle cx="220" cy="5" r="2" fill="#f0e0a8"/>

  <!-- "SHOP" sign banner -->
  <rect x="80" y="10" width="80" height="18" fill="#c05858" rx="2"/>
  <rect x="82" y="12" width="76" height="14" fill="#e0a8a8" rx="1"/>
  <rect x="96" y="16" width="6" height="6" fill="#3a1818"/>
  <rect x="108" y="16" width="6" height="6" fill="#3a1818"/>
  <rect x="120" y="16" width="6" height="6" fill="#3a1818"/>
  <rect x="132" y="16" width="6" height="6" fill="#3a1818"/>

  <!-- Clothing rack (left) -->
  <rect x="8" y="36" width="2" height="32" fill="#787068"/>
  <rect x="46" y="36" width="2" height="32" fill="#787068"/>
  <rect x="8" y="36" width="40" height="2" fill="#787068"/>
  <!-- Hanging clothes -->
  <rect x="12" y="38" width="6" height="22" fill="#c04050" rx="1"/>
  <rect x="13" y="38" width="4" height="2" fill="#787068"/>
  <rect x="20" y="38" width="6" height="24" fill="#4060a0" rx="1"/>
  <rect x="21" y="38" width="4" height="2" fill="#787068"/>
  <rect x="28" y="38" width="6" height="22" fill="#60a060" rx="1"/>
  <rect x="29" y="38" width="4" height="2" fill="#787068"/>
  <rect x="36" y="38" width="6" height="26" fill="#d8b040" rx="1"/>
  <rect x="37" y="38" width="4" height="2" fill="#787068"/>

  <!-- Display shelves (middle-left) -->
  <rect x="56" y="42" width="40" height="30" fill="#a88860" rx="1"/>
  <rect x="58" y="44" width="36" height="8" fill="#c8a878"/>
  <rect x="58" y="54" width="36" height="8" fill="#c8a878"/>
  <rect x="58" y="64" width="36" height="6" fill="#c8a878"/>
  <!-- Items on shelves -->
  <rect x="60" y="46" width="6" height="4" fill="#4080c0" rx="1"/>
  <rect x="68" y="46" width="6" height="4" fill="#c04080" rx="1"/>
  <rect x="76" y="46" width="6" height="4" fill="#d08040" rx="1"/>
  <rect x="84" y="46" width="8" height="4" fill="#60a060" rx="1"/>
  <!-- Middle shelf - boxes -->
  <rect x="60" y="56" width="8" height="4" fill="#e8d8a8" rx="1"/>
  <rect x="70" y="56" width="8" height="4" fill="#d8c898" rx="1"/>
  <rect x="80" y="56" width="8" height="4" fill="#e8d8a8" rx="1"/>
  <!-- Bottom shelf - bags -->
  <rect x="60" y="64" width="10" height="6" fill="#8060a0" rx="1"/>
  <rect x="72" y="64" width="10" height="6" fill="#a06040" rx="1"/>
  <rect x="84" y="64" width="8" height="6" fill="#406080" rx="1"/>

  <!-- Cash register / checkout counter (center) -->
  <rect x="104" y="54" width="42" height="4" fill="#d0b888" rx="1"/>
  <rect x="104" y="58" width="42" height="14" fill="#b09868"/>
  <rect x="106" y="60" width="38" height="10" fill="#c0a878" rx="1"/>
  <!-- Cash register -->
  <rect x="116" y="42" width="18" height="12" fill="#303030" rx="1"/>
  <rect x="117" y="43" width="16" height="6" fill="#60c080"/>
  <rect x="118" y="50" width="14" height="3" fill="#404040"/>
  <!-- Receipt -->
  <rect x="138" y="48" width="4" height="8" fill="#f8f0e0"/>

  <!-- Mannequin / display (right side) -->
  <!-- Mannequin head -->
  <circle cx="170" cy="40" r="4" fill="#e8d8c0"/>
  <!-- Mannequin body -->
  <rect x="166" y="44" width="8" height="14" fill="#a0c0d8"/>
  <rect x="168" y="58" width="4" height="12" fill="#484838"/>
  <!-- Mannequin stand -->
  <rect x="166" y="70" width="8" height="2" fill="#606060"/>

  <!-- Second mannequin -->
  <circle cx="190" cy="40" r="4" fill="#e8d8c0"/>
  <rect x="186" y="44" width="8" height="10" fill="#c06060"/>
  <rect x="186" y="54" width="8" height="16" fill="#403828"/>
  <rect x="186" y="70" width="8" height="2" fill="#606060"/>

  <!-- Shelf with shoes / accessories (right) -->
  <rect x="204" y="50" width="32" height="22" fill="#a88860" rx="1"/>
  <rect x="206" y="52" width="28" height="8" fill="#c8a878"/>
  <rect x="206" y="62" width="28" height="8" fill="#c8a878"/>
  <!-- Shoes -->
  <rect x="208" y="55" width="8" height="4" fill="#2a2018" rx="1"/>
  <rect x="218" y="55" width="8" height="4" fill="#803828" rx="1"/>
  <rect x="228" y="55" width="6" height="4" fill="#201818" rx="1"/>
  <rect x="208" y="65" width="8" height="4" fill="#a04040" rx="1"/>
  <rect x="218" y="65" width="8" height="4" fill="#4060a0" rx="1"/>
  <rect x="228" y="65" width="6" height="4" fill="#a08040" rx="1"/>

  <!-- Sale poster on wall -->
  <rect x="36" y="14" width="22" height="16" fill="#f0e8c8" rx="1"/>
  <rect x="38" y="16" width="18" height="4" fill="#c04040"/>
  <rect x="40" y="22" width="14" height="2" fill="#3a3020"/>
  <rect x="40" y="26" width="12" height="2" fill="#3a3020"/>

  <!-- Shopping bag on floor -->
  <rect x="156" y="64" width="10" height="8" fill="#d8b898" rx="1"/>
  <rect x="158" y="62" width="2" height="4" fill="#a08868"/>
  <rect x="162" y="62" width="2" height="4" fill="#a08868"/>
</svg>
