  <rect x="386" y="4" width="2" height="46" fill="#6a0c18"/>
  <rect x="390" y="4" width="2" height="46" fill="#a82028"/>
  <rect x="394" y="4" width="2" height="46" fill="#6a0c18"/>

  <!-- Curtain rod/valance across top -->
  <rect x="80" y="2" width="320" height="4" fill="#6a0c18"/>
  <rect x="80" y="0" width="320" height="2" fill="#8a1020"/>

  <!-- Sconce wall lights -->
  <rect x="40" y="20" width="4" height="2" fill="#a89048"/>
  <path d="M 36 22 L 48 22 L 46 30 L 38 30 Z" fill="#e0c868"/>
  <circle cx="42" cy="26" r="2" fill="#ffe098"/>

  <rect x="436" y="20" width="4" height="2" fill="#a89048"/>
  <path d="M 432 22 L 444 22 L 442 30 L 434 30 Z" fill="#e0c868"/>
  <circle cx="438" cy="26" r="2" fill="#ffe098"/>

  <!-- Audience rows of seats (tiered) -->
  <!-- Row 1 back row (behind) -->
