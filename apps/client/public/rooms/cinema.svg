<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- Back wall - deep theater red -->
  <rect x="0" y="0" width="480" height="76" fill="#481018"/>

  <!-- Baseboard -->
  <rect x="0" y="72" width="480" height="4" fill="#280808"/>

  <!-- Floor - dark aisle -->
  <rect x="0" y="76" width="480" height="4" fill="#3a1818"/>

  <!-- Screen (large center, shows frame) -->
  <rect x="100" y="6" width="280" height="44" fill="#1a1818" rx="1"/>
  <rect x="104" y="10" width="272" height="36" fill="#2a2828"/>
  <!-- Movie scene on screen -->
  <!-- Sky -->
  <rect x="104" y="10" width="272" height="18" fill="#3a4868"/>
  <!-- Horizon / ground -->
  <rect x="104" y="28" width="272" height="18" fill="#58382a"/>
  <!-- Silhouette mountains -->
  <path d="M 104 28 L 140 16 L 170 24 L 210 14 L 240 24 L 280 18 L 320 26 L 360 16 L 376 22 L 376 28 Z" fill="#20283a"/>
  <!-- Figure silhouette -->
  <rect x="230" y="22" width="4" height="12" fill="#10141c"/>
  <circle cx="232" cy="21" r="2" fill="#10141c"/>
  <!-- Title text bar -->
  <rect x="180" y="38" width="120" height="4" fill="#d8c048"/>
  <rect x="186" y="39" width="40" height="2" fill="#2a1a18"/>
  <rect x="230" y="39" width="32" height="2" fill="#2a1a18"/>
  <rect x="266" y="39" width="28" height="2" fill="#2a1a18"/>

  <!-- Red velvet curtains on sides of screen -->
  <path d="M 82 4 L 100 4 L 100 50 Q 92 46 82 50 Z" fill="#8a1020"/>
  <rect x="82" y="4" width="2" height="46" fill="#a82028"/>
  <rect x="86" y="4" width="2" height="46" fill="#6a0c18"/>
  <rect x="90" y="4" width="2" height="46" fill="#a82028"/>
  <rect x="94" y="4" width="2" height="46" fill="#6a0c18"/>

  <path d="M 380 4 L 398 4 L 398 50 Q 388 46 380 50 Z" fill="#8a1020"/>
