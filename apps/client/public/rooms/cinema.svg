    <rect x="214" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <rect x="228" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <rect x="242" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <rect x="256" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <circle cx="206" cy="58" r="3" fill="#c89878"/>
    <circle cx="220" cy="58" r="3" fill="#8a6848"/>
    <circle cx="234" cy="58" r="3" fill="#e0b898"/>
    <circle cx="248" cy="58" r="3" fill="#d8b090"/>
    <circle cx="262" cy="58" r="3" fill="#a87858"/>
  </g>

  <g>
    <rect x="280" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <rect x="294" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <rect x="308" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <rect x="322" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <rect x="336" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <circle cx="286" cy="58" r="3" fill="#8a6848"/>
    <circle cx="300" cy="58" r="3" fill="#c89878"/>
    <circle cx="314" cy="58" r="3" fill="#d8b090"/>
    <circle cx="328" cy="58" r="3" fill="#e0b898"/>
    <circle cx="342" cy="58" r="3" fill="#a87858"/>
  </g>

  <g>
    <rect x="362" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
    <rect x="376" y="58" width="12" height="14" fill="#8a2030" rx="2"/>
  </g>

  <g>
    <rect x="410" y="52" width="12" height="10" fill="#6a1828" rx="2"/>
    <rect x="424" y="52" width="12" height="10" fill="#6a1828" rx="2"/>
    <rect x="438" y="52" width="12" height="10" fill="#6a1828" rx="2"/>
    <rect x="452" y="52" width="12" height="10" fill="#6a1828" rx="2"/>
    <circle cx="416" cy="52" r="3" fill="#d8b090"/>
    <circle cx="430" cy="52" r="3" fill="#8a6848"/>
    <circle cx="444" cy="52" r="3" fill="#c89878"/>
    <circle cx="458" cy="52" r="3" fill="#e0b898"/>
