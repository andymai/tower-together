    <rect x="20" y="52" width="12" height="10" fill="#6a1828" rx="2"/>
    <rect x="34" y="52" width="12" height="10" fill="#6a1828" rx="2"/>
    <rect x="48" y="52" width="12" height="10" fill="#6a1828" rx="2"/>
    <rect x="62" y="52" width="12" height="10" fill="#6a1828" rx="2"/>
