name = "tower-together-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "../client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[routes]]
pattern = "towers.world"
custom_domain = true

[[rules]]
type = "Text"
globs = ["migrations/*.sql"]
fallthrough = true

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

[dev]
port = 8787

[[durable_objects.bindings]]
name = "TOWER_ROOM"
class_name = "TowerRoom"

[[durable_objects.bindings]]
name = "TOWER_REGISTRY"
class_name = "TowerRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TowerRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TowerRegistry"]
